services:
  # Main app: Express API + React Frontend
  - type: web
    name: earnly-app
    runtime: node
    region: singapore
    plan: free
    rootDir: .
    buildCommand: cd client && npm install --include=dev && npm run build && cd ../server && npm install
    startCommand: cd server && node index.js
    envVars:
      - key: NODE_ENV
        value: production
      - key: PORT
        value: 10000
      - key: ML_SERVICE_URL
        sync: false

  # Python ML Service
  - type: web
    name: earnly-ml
    runtime: python
    region: singapore
    plan: free
    rootDir: ml-service
    buildCommand: pip install -r requirements.txt
    startCommand: gunicorn app:app --bind 0.0.0.0:$PORT --timeout 120
    envVars:
      - key: PORT
        value: 10000
      - key: FLASK_ENV
        value: production
